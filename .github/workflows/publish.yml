name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (defaults to release tag or current package.json)"
        required: false

permissions:
  contents: write   # create the git tag + GitHub Release on a dispatched publish
  id-token: write   # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: ver
        run: |
          INPUT="${{ github.event.inputs.version }}"
          TAG="${GITHUB_REF_NAME#v}"
          if [ -n "$INPUT" ]; then
            VERSION="${INPUT#v}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="$TAG"
          else
            VERSION="$(node -p "require('./projects/ngx-cerious-widgets/package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Sync library version
        working-directory: projects/ngx-cerious-widgets
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build library
        run: npm run build -- ngx-cerious-widgets --configuration production

      - name: Publish
        working-directory: dist/ngx-cerious-widgets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      # When you cut a release straight from the Actions tab (workflow_dispatch),
      # also stamp a matching git tag + GitHub Release. Skipped when triggered by
      # a release you created in the UI — that release already exists.
      - name: Tag and create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists — skipping tag/release creation."
            exit 0
          fi
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --generate-notes
