<div #tablePager
     class="cw-table-pager"
     role="navigation"
     aria-label="Table Pager"
     [ngClass]="classes.container">

  <!-- Grouped: a plain summary (paging is disabled while grouped). -->
  @if (hasGroupBy) {
    <div class="cw-paging">
      <span aria-live="polite">Viewing ({{ pagerInfo?.start }}-{{ pagerInfo?.total }}) of {{ pagerInfo?.total }}</span>
    </div>
  } @else {
    <!-- Ungrouped: the standalone Paginator drives navigation + the range summary.
         Each region is configurable via gridOptions.pager. -->
    <cw-paginator
      class="cw-grid-paginator"
      [totalRecords]="gridDataset?.totalRowCount || 0"
      [pageSize]="gridOptions.pageSize || 10"
      [page]="(gridDataset?.pageNumber || 1) - 1"
      [pageSizeOptions]="gridOptions.pager?.pageSizeOptions || [gridOptions.pageSize || 10]"
      [showPageSize]="gridOptions.pager?.showPageSize ?? true"
      [showSummary]="gridOptions.pager?.showSummary ?? true"
      [showFirstLast]="gridOptions.pager?.showFirstLast ?? true"
      [showPrevNext]="gridOptions.pager?.showPrevNext ?? true"
      [showPageNumbers]="gridOptions.pager?.showPageNumbers ?? true"
      (pageChange)="onPaginatorChange($event)" />
  }
</div>
