<div #tableBody
     class="cw-table-body"
     [class.cw-table-body--no-virtual]="!useVirtualScroll"
     role="grid"
     aria-label="Data Grid"
     [ngClass]="classes.container"
     (click)="onClick($event)"
     (dblclick)="onDoubleClick($event)"
     (keydown)="onKeydown($event)"
     (keyup)="onKeyup($event)"
     (keypress)="onKeypress($event)">

    <ng-container *ngIf="useVirtualScroll; else nonVirtual">
        <div class="cw-table-body__virtual-host"
             ceriousScroll
             [ceriousScrollItems]="flattenedRows"
             [ceriousScrollItemTemplate]="rowTemplate"
             [ceriousScrollOptions]="scrollOptions"
             (ceriousScrollReady)="onScrollerReady($event)">
        </div>
    </ng-container>

    <ng-template #nonVirtual>
        <div #nonVirtualContent class="cw-table-body__static-content">
            <ng-container *ngFor="let item of flattenedRows; let i = index; trackBy: trackByRow">
                <ng-container *ngTemplateOutlet="rowTemplate; context: { $implicit: item, index: i }"></ng-container>
            </ng-container>
        </div>
    </ng-template>

    <!-- Empty-state message rendered as a normal child of the body. -->
    <div class="cw-no-data" *ngIf="flattenedRows.length === 0">
        {{ gridOptions.noDataMessage }}
    </div>
</div>

<!-- Row template rendered by the cerious-scroll engine for each visible item. -->
<ng-template #rowTemplate let-item let-index="index">
  <ng-container *ngIf="item">
    <!-- Group header -->
    <div *ngIf="item.isGroup"
         class="group-header"
         role="row"
         [attr.aria-expanded]="expandedGroups[item.key]"
         [attr.aria-level]="item.depth"
         [style.minWidth]="rowMinWidth"
         [style.paddingLeft.px]="8 + item.depth * 20">
        <button class="group-header__toggle"
                (click)="toggleGroupCollapse(item.key)"
                [attr.aria-label]="'Toggle group ' + item.key">
            <span class="group-header__chevron"
                  [class.group-header__chevron--open]="expandedGroups[item.key]"></span>
        </button>
        <span class="group-header__label">{{ item.key }}</span>
        <span class="group-header__count">{{ item.rowCount }}</span>
    </div>

    <!-- Data row -->
    <ng-container *ngIf="!item.isGroup">
        <cw-grid-row #rowElement
                     class="cw-table-row"
                     role="row"
                     tabindex="0"
                     [attr.data-row-id]="item.row.id"
                     [class.even]="index % 2 === 0"
                     [class.odd]="index % 2 !== 0"
                     [ngClass]="classes.row"
                     [gridRow]="item.row"
                     [refreshTick]="refreshTick"
                     [style.minWidth]="rowMinWidth"
                     [classes]="classes"
                     (toggleNestedRow)="toggleNestedRow(item.row)">
        </cw-grid-row>

        <!-- Nested row rendered with the same item so its height is measured together. -->
        <cw-nested-row *ngIf="item.row.nestedExpanded"
                       #nestedRowElement
                       class="cw-table-row nested-row"
                       role="row"
                       tabindex="0"
                       [gridRow]="item.row"
                       [style.minWidth]="rowMinWidth">
        </cw-nested-row>
    </ng-container>
  </ng-container>
</ng-template>
