<div srole="gridcell"
     class="cell-content-wrapper"
     [ngClass]="classes.cell"
     [style.width]="width()"
     [style.text-align]="alignment()"
     [attr.aria-label]="column.label || 'Column'">

    <ng-container [ngSwitch]="cellMode()">

        <!-- Custom cell template -->
        <ng-container *ngSwitchCase="CellMode.Template">
            <ng-template [ngTemplateOutlet]="cellTemplateRef()"
                         [ngTemplateOutletContext]="{gridRow: gridRow, row: gridRow.row, column: column, value: value()}">
            </ng-template>
        </ng-container>

        <!-- Editable fields based on column type -->
        <ng-container *ngSwitchCase="CellMode.Editable" [ngSwitch]="column.type || ColumnType.String">
            <input *ngSwitchCase="ColumnType.String"
                   cwInput
                   type="text"
                   [value]="formattedValue()"
                   (input)="onValueChange($event)" />
            <input *ngSwitchCase="ColumnType.Number"
                   cwInput
                   type="number"
                   [value]="value()"
                   (input)="onValueChange($event)" />
            <select *ngSwitchCase="ColumnType.Dropdown"
                    class="cw-input cw-grid-edit-select"
                    [value]="value()"
                    (change)="onValueChange($event)">
                <option *ngFor="let option of column.valueOptions; trackBy: dropdownTrackBy" [value]="option.id">{{option.value}}</option>
            </select>
            <input *ngSwitchCase="ColumnType.Date"
                   cwInput
                   type="date"
                   [value]="value()"
                   (input)="onValueChange($event)" />
            <input *ngSwitchCase="ColumnType.DateTime"
                   cwInput
                   type="datetime-local"
                   [value]="value()"
                   (input)="onValueChange($event)" />
            <input *ngSwitchCase="ColumnType.Time"
                   cwInput
                   type="time"
                   [value]="value()"
                   (input)="onValueChange($event)" />
            <input *ngSwitchCase="ColumnType.Boolean"
                   type="checkbox"
                   [checked]="value()"
                   (change)="onValueChange($event)" />
            <div *ngSwitchDefault>
                {{ formattedValue() }}
            </div>
        </ng-container>

        <!-- Format-based display for non-editable columns -->
        <ng-container *ngSwitchCase="CellMode.Format" [ngSwitch]="column.format">
            <div *ngSwitchCase="ColumnFormat.Currency">{{ value() | currency }}</div>
            <div *ngSwitchCase="ColumnFormat.Percentage">{{ value() | percent }}</div>
            <div *ngSwitchCase="ColumnFormat.Stars" class="cw-cell-stars">
                <span *ngFor="let star of [1,2,3,4,5]"
                      class="cw-star"
                      [class.cw-star--on]="star <= value()">&#9733;</span>
            </div>
            <div *ngSwitchCase="ColumnFormat.Date">{{ value() | date:'shortDate' }}</div>
            <div *ngSwitchCase="ColumnFormat.DateTime">{{ value() | date:'short' }}</div>
            <div *ngSwitchCase="ColumnFormat.Time">{{ value() | date:'shortTime' }}</div>
            <div *ngSwitchDefault>{{ value() }}</div>
        </ng-container>

        <!-- Default plain display -->
        <div *ngSwitchDefault>{{ value() }}</div>

    </ng-container>
</div>
