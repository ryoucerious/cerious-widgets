<!-- Visual horizontal scroll-sync element (only a spacer div). Native overflow
     scrolling already exposes this to the platform, and AT users navigate the
     grid by cell, so it's hidden from the accessibility tree rather than posing
     as a `scrollbar` widget inside the grid role. -->
<div #scroller
     style="overflow-x: scroll; overflow-y: hidden;"
     [ngStyle]="{
      'height': getScrollHeight() + 'px',
      'marginLeft': pinnedColumnWidth + 'px'
     }"
     aria-hidden="true">
  <div [ngStyle]="{
        'width': tableScrollWidth - moddedColumnWidth + 'px'
       }">
    &nbsp;
  </div>
</div>
