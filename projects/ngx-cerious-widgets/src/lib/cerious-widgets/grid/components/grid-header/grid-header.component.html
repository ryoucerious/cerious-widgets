<div #tableHead
     class="cw-table-head"
     role="rowgroup"
     [style.overflowX]="os === 'iOS' || os === 'Mac OS' ? 'auto' : 'hidden'"
     [style.overflowX]="'hidden'"
     [ngClass]="classes.container"
     (keydown)="onKeyDown($event)">
    <ng-container *ngFor="let row of rows; let rowIndex = index">
        <cw-grid-header-row class="cw-table-row column-headers-standard"
                            role="row"
                            [attr.aria-rowindex]="rowIndex + 1"
                            [gridRow]="row"
                            [style.minWidth]="rowMinWidth"
                            [classes]="classes">
        </cw-grid-header-row>
    </ng-container>

    <!-- Group By Breadcrumbs -->
    <div *ngIf="groupByColumns?.length"
        #breadcrumb
        class="cw-breadcrumb-container"
        role="navigation"
        aria-label="Group By Breadcrumb">
        <span class="cw-groupby__title">Group by</span>
        <ng-container *ngFor="let column of groupByColumns; let last = last">
            <cw-chip class="cw-groupby__chip"
                     role="listitem"
                     [label]="column.label || column.field || ''"
                     removable
                     (remove)="removeGroupByColumn(column)" />
            <svg *ngIf="!last" class="cw-groupby__chevron" viewBox="0 0 16 16"
                 width="14" height="14" aria-hidden="true" focusable="false">
                <path d="M6 3.5L10.5 8 6 12.5" fill="none" stroke="currentColor"
                      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </ng-container>
    </div>
</div>
