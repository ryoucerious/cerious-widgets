<ol class="cw-steps__list">
  @for (item of items(); track $index; let i = $index; let last = $last) {
    <li
      class="cw-steps__item"
      [class.cw-steps__item--done]="i < currentIndex()"
      [class.cw-steps__item--active]="i === currentIndex()"
      [class.cw-steps__item--clickable]="clickable() && !item.disabled"
      [attr.aria-current]="i === currentIndex() ? 'step' : null"
      (click)="select(i)"
    >
      <span class="cw-steps__marker" aria-hidden="true">
        @if (i < currentIndex()) {
          <span class="cw-steps__check"></span>
        } @else {
          {{ i + 1 }}
        }
      </span>
      <span class="cw-steps__label">{{ item.label }}</span>
      @if (!last) {
        <span class="cw-steps__connector" aria-hidden="true"></span>
      }
    </li>
  }
</ol>
