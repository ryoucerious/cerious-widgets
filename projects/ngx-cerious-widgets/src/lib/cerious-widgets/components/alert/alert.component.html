<span class="cw-alert__icon" aria-hidden="true">
  @switch (severity()) {
    @case ('success') {
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 8.2 7.1 10.3 11 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    }
    @case ('warn') {
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 2 14.5 13.5H1.5L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 6.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.6" r="0.9" fill="currentColor"/></svg>
    }
    @case ('danger') {
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5.8 5.8 10.2 10.2M10.2 5.8 5.8 10.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    }
    @default {
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7.4v3.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="5" r="0.9" fill="currentColor"/></svg>
    }
  }
</span>
<div class="cw-alert__content"><ng-content /></div>
@if (closable()) {
  <button type="button" class="cw-alert__close" aria-label="Close" (click)="close()">
    <span class="cw-alert__close-x" aria-hidden="true"></span>
  </button>
}
