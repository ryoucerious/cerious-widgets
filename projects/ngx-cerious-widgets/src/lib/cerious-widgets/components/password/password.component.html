<div class="cw-password__field">
  <input
    [type]="revealed() ? 'text' : 'password'"
    class="cw-password__input"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    autocomplete="off"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
  @if (toggleMask()) {
    <button
      type="button"
      class="cw-password__toggle"
      [attr.aria-label]="revealed() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="revealed()"
      [disabled]="isDisabled()"
      (click)="toggleReveal()"
    >
      @if (revealed()) {
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 3l14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8.5 8.6a2 2 0 002.8 2.8M6.4 6.5C4.5 7.6 3 10 3 10s2.5 4 7 4a7.7 7.7 0 003.6-.9M11 6.1C13.9 6.6 16 10 16 10a13 13 0 01-1 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      } @else {
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 10s2.5-4 7-4 7 4 7 4-2.5 4-7 4-7-4-7-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/></svg>
      }
    </button>
  }
</div>

@if (feedback() && strength()) {
  <div class="cw-password__meter" [attr.data-strength]="strength()">
    <div class="cw-password__bars">
      @for (bar of [1, 2, 3, 4]; track bar) {
        <span class="cw-password__bar" [class.cw-password__bar--on]="bar <= score()"></span>
      }
    </div>
    <span class="cw-password__label">{{ strength() }}</span>
  </div>
}
